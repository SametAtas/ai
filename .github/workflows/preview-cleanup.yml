name: Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  id-token: write
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GC_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GC_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Remove Preview Traffic Tag
        run: |
          gcloud run services update-traffic cofacts-ai \
            --region asia-east1 \
            --remove-tags="pr-${{ github.event.number }}" || echo "Tag not found or service does not exist, skipping."

      - name: Deactivate and Delete GitHub Deployments
        uses: actions/github-script@v7
        with:
          script: |
            const environment_name = `pr-${context.issue.number}`;
            const { owner, repo } = context.repo;

            const { data: deployments } = await github.rest.repos.listDeployments({
              owner,
              repo,
              environment: environment_name,
              per_page: 100,
            });

            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner,
                repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
              await github.rest.repos.deleteDeployment({
                owner,
                repo,
                deployment_id: deployment.id,
              });
            }
            console.log(`Deleted ${deployments.length} deployment(s) for environment ${environment_name}`);
