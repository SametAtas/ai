name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: adk/uv.lock
      - name: Install dependencies
        run: uv sync --directory adk --dev
      - name: Check formatting (ruff format)
        run: uv run --directory adk ruff format --check .
      - name: Lint (ruff check)
        if: ${{ !cancelled() }}
        run: uv run --directory adk ruff check .
      - name: Typecheck (ty)
        if: ${{ !cancelled() }}
        run: uv run --directory adk ty check .
